server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow hotel/room photo uploads to pass through to FastAPI.
    client_max_body_size 25m;

    # Reverse-proxy the API and backend-served assets to the FastAPI container.
    # The service name "backend" resolves on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded images served by FastAPI from /static.
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Health check + API docs (handy for debugging from the browser).
    location = /health      { proxy_pass http://backend:8000; }
    location /docs          { proxy_pass http://backend:8000; }
    location /redoc         { proxy_pass http://backend:8000; }
    location = /openapi.json { proxy_pass http://backend:8000; }

    # SPA fallback: every other route is handled by React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
